    <style>
      /* Hotbar Styles */asd
      .hotbar-container {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        background: rgba(0, 0, 0, 0.7);
        padding: 12px;
        border-radius: 8px;
        border: 2px solid #444;
        z-index: 100;
      }

      .hotbar-slot {
        width: 50px;
        height: 50px;
        background: rgba(100, 100, 100, 0.9);
        border: 2px solid #666;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.1s;
        position: relative;
        font-size: 12px;
        color: #fff;
        font-weight: bold;
      }

      .hotbar-slot:hover {
        background: rgba(120, 120, 120, 0.9);
        border-color: #888;
      }

      .hotbar-slot.active {
        background: rgba(255, 200, 0, 0.9);
        border-color: #ffd700;
        box-shadow: 0 0 10px rgba(255, 200, 0, 0.6);
      }

      .hotbar-slot-key {
        position: absolute;
        top: 4px;
        right: 4px;
        font-size: 10px;
        background: rgba(0, 0, 0, 0.8);
        padding: 2px 4px;
        border-radius: 2px;
      }

      .hotbar-slot-icon {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }
    </style>
  </head>
